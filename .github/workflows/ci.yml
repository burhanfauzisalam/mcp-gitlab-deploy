name: CI

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-python:
    name: Validate Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile source
        run: python -m compileall src

  validate-compose:
    name: Validate Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose -f docker-compose.traefik.yml config > /tmp/compose.out
          test -s /tmp/compose.out

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - validate-python
      - validate-compose
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker build -t gitlab-deploy-mcp:ci .; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "docker build failed after ${attempt} attempts"
              exit 1
            fi
            echo "docker build attempt ${attempt} failed, retrying in 20s"
            sleep 20
          done
