services:
  mcp-gitlab-deploy:
    container_name: mcp-gitlab-deploy
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GITLAB_DEPLOYMENT_ROOT: ${GITLAB_DEPLOYMENT_ROOT:-/home/ubuntu/apps/deploy}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_STREAMABLE_HTTP_PATH: ${MCP_STREAMABLE_HTTP_PATH:-/mcp}
      MCP_MOUNT_PATH: ${MCP_MOUNT_PATH:-}
      MCP_SSE_PATH: ${MCP_SSE_PATH:-/sse}
      GITLAB_ACCESS_TOKEN: ${GITLAB_ACCESS_TOKEN:-}
    volumes:
      - ${DEPLOYMENT_DATA_DIR:-/home/ubuntu/apps/deploy}:${GITLAB_DEPLOYMENT_ROOT:-/home/ubuntu/apps/deploy}
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-web}"
      - "traefik.http.routers.mcp-gitlab-deploy.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.mcp-gitlab-deploy.rule=Host(`${MAIN_DOMAIN:-apps.burhanfs.my.id}`) && PathPrefix(`/gitlab-deploy`)"
      - "traefik.http.routers.mcp-gitlab-deploy.tls=true"
      - "traefik.http.routers.mcp-gitlab-deploy.middlewares=mcp-gitlab-deploy-strip"
      - "traefik.http.middlewares.mcp-gitlab-deploy-strip.stripprefix.prefixes=/gitlab-deploy"
      - "traefik.http.services.mcp-gitlab-deploy.loadbalancer.server.port=8000"

networks:
  web:
    external: true
    name: ${TRAEFIK_NETWORK:-web}
